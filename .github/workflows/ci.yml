name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: timemanager
          POSTGRES_PASSWORD: timemanager_test
          POSTGRES_DB: timemanager_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U timemanager -d timemanager_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install backend
        run: cd backend && npm ci
      - name: Prisma generate
        run: cd backend && npx prisma generate
      - name: Run migrations
        run: cd backend && npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://timemanager:timemanager_test@localhost:5432/timemanager_test
      - name: Run tests
        run: cd backend && npm run test
        env:
          DATABASE_URL: postgresql://timemanager:timemanager_test@localhost:5432/timemanager_test
          JWT_SECRET: test_secret
      - name: Run tests with coverage
        run: cd backend && npm run test:coverage
        env:
          DATABASE_URL: postgresql://timemanager:timemanager_test@localhost:5432/timemanager_test
          JWT_SECRET: test_secret
          NODE_V8_COVERAGE: coverage
      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          if-no-files-found: ignore

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
      - name: Lint backend
        run: cd backend && npm ci && npm run lint
      - name: Lint frontend
        run: cd frontend && npm ci && npm run lint

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend
        run: cd frontend && npm ci
      - name: Build
        run: cd frontend && npm run build
      - name: Run tests
        run: cd frontend && npm run test
      - name: Run tests with coverage
        run: cd frontend && npm run test:coverage
      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend, lint]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t timemanager-backend:ci ./backend
      - name: Build frontend prod image
        run: docker build -f frontend/Dockerfile.prod -t timemanager-frontend:ci ./frontend
